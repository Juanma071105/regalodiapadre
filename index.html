<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Día del Padre</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- BALONES -->
    <div class="ballon b1">⚽</div>
    <div class="ballon b2">⚽</div>
    <div class="ballon b3">⚽</div>
    <div class="ballon b4">⚽</div>
    <div class="ballon b1">⚽</div>
    <div class="ballon b2">⚽</div>
    <div class="ballon b3">⚽</div>
    <div class="ballon b4">⚽</div>

    <!-- GLOBOS -->
    <div class="ballon b5">🎈</div>
    <div class="ballon b6">🎈</div>
    <div class="ballon b7">🎈</div>
    <div class="ballon b8">🎈</div>

    <!-- CARTA -->
    <div class="container">
        <div class="card">

            <!-- FRENTE -->
            <div class="front">
                <h1>Feliz Día Papá 💖⚽</h1>
                <p>Pasa el mouse para abrir ✨</p>
            </div>

            <!-- ATRÁS -->
            <div class="back">
                <div class="photo-frame">
                    <img src="papa.jpg" alt="Foto">
                </div>
                <div class="message" id="typedText"></div>
                <div class="signature">
                    Con mucho amor 💕
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
